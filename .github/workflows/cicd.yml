name: CI/CD for frontend

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"

  pull_request:
    branches:
      - main
      - develop

env:
  IMAGE_NAME: faberge-frontend

jobs:
  hadolint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
  
  docker:
    runs-on: ubuntu-latest
    needs: hadolint
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Extract branch name
        run: echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare tags
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}

          TAGS="$IMAGE:${{ github.sha }}"

          if [ "$BRANCH_NAME" = "develop" ]; then
            TAGS="$TAGS,$IMAGE:develop"
          fi

          if [ "$BRANCH_NAME" = "main" ]; then
            TAGS="$TAGS,$IMAGE:latest"
          fi

          if [[ "$BRANCH_NAME" == feature/* ]]; then
            TAG=$(echo $BRANCH_NAME | sed 's|feature/||')
            TAGS="$TAGS,$IMAGE:feature-$TAG"
          fi

          if [[ "$BRANCH_NAME" == release/* ]]; then
            TAG=$(echo $BRANCH_NAME | sed 's|release/||')
            TAGS="$TAGS,$IMAGE:rc-$TAG"
          fi

          if [[ "$BRANCH_NAME" == hotfix/* ]]; then
            TAG=$(echo $BRANCH_NAME | sed 's|hotfix/||')
            TAGS="$TAGS,$IMAGE:hotfix-$TAG"
          fi

          echo "TAGS=$TAGS" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: prod
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
