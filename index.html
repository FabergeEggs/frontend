<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<h1>Citizen Science</h1>

		<button onclick="loadAuth()">Auth service</button>
		<button onclick="loadProject()">Project service</button>

		<p id="result"></p>

		<script>
			async function loadAuth() {
				const r = await fetch("http://localhost:8080/auth/");
				const text = await r.text();
				document.getElementById("result").innerText = text;
			}

			async function loadProject() {
				const r = await fetch("http://localhost:8080/project/");
				const text = await r.text();
				document.getElementById("result").innerText = text;
			}
		</script>
	</body>
</html>
